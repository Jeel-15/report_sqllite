<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}ReportGen - Internship Report Generator{% endblock %}</title>
    <!-- NEW DESIGN SYSTEM CSS -->
    <link rel="stylesheet" href="/static/css/index.css">
    <!-- Bootstrap CSS (kept for form components compatibility) -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <!-- GSAP Library -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Serif+Display:ital@0;1&display=swap');

        :root {
            --pri: #0f0f1e;
            --acc: #e84393;
            --acc2: #7c3aed;
            --page-bg: #f0f2f8;
            --card: #ffffff;
            --srf: #f6f4fc;
            --srf2: #ffffff;
            --brd: #e8e4f0;
            --txt: #1a1a2e;
            --txt2: #6b6783;
            --txt3: #9b97b0;
            --grn: #059669;
            --amb: #d97706;
            --red: #dc2626;
            --font-disp: 'DM Serif Display', serif;
            --font-body: 'DM Sans', sans-serif;
            --shadow-soft: 0 10px 28px rgba(26, 26, 46, 0.06);
        }

        * {
            box-sizing: border-box;
        }

        body {
            font-family: var(--font-body);
            background:
                radial-gradient(950px 320px at -10% -20%, rgba(124, 58, 237, 0.10), transparent 60%),
                radial-gradient(880px 280px at 110% -10%, rgba(232, 67, 147, 0.08), transparent 60%),
                var(--page-bg);
            color: var(--txt);
        }

        .container.main-content {
            max-width: 1220px;
            padding-top: 104px;
            padding-bottom: 24px;
        }

        .navbar#mainNavbar {
            background: var(--pri) !important;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 6px 20px rgba(26, 26, 46, 0.2);
            margin-bottom: 1.4rem !important;
            position: sticky;
            top: 0;
            z-index: 1030;
        }

        .navbar-brand {
            font-family: var(--font-disp);
            letter-spacing: -0.2px;
            font-size: 1.45rem;
            color: #fff !important;
            display: inline-flex;
            align-items: center;
            gap: 0.52rem;
        }

        .brand-icon {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 1.55rem;
            height: 1.55rem;
            border-radius: 0.45rem;
            font-size: 0.92rem;
            background: rgba(255, 255, 255, 0.16);
            box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.2);
        }

        .navbar .nav-link {
            color: rgba(255, 255, 255, 0.72) !important;
            font-size: 0.88rem;
            font-weight: 500;
            transition: color .18s ease;
            position: relative;
        }

        .navbar .nav-link::after {
            content: '';
            position: absolute;
            left: 0.5rem;
            right: 0.5rem;
            bottom: 0.18rem;
            height: 2px;
            background: linear-gradient(135deg, var(--acc2), var(--acc));
            border-radius: 999px;
            transform: scaleX(0);
            transform-origin: left;
            transition: transform 0.24s ease;
        }

        .navbar .nav-link:hover,
        .navbar .nav-link:focus {
            color: #fff !important;
        }

        .navbar .nav-link:hover::after,
        .navbar .nav-link:focus::after,
        .navbar .nav-link.active::after {
            transform: scaleX(1);
        }

        .navbar .nav-link.active {
            color: #fff !important;
            background: linear-gradient(135deg, var(--acc2), var(--acc));
            border-radius: 999px;
            padding-left: 0.7rem;
            padding-right: 0.7rem;
        }

        .navbar .dropdown-toggle::after {
            margin-left: 0.45rem;
            vertical-align: 0.15em;
        }

        .nav-section-divider {
            width: 1px;
            height: 1.2rem;
            background: rgba(255, 255, 255, 0.2);
            margin: 0 0.28rem;
            align-self: center;
        }

        #mainNavbar .dropdown-menu {
            border: 1px solid rgba(0, 0, 0, 0.08);
            box-shadow: 0 12px 28px rgba(17, 24, 39, 0.15);
            border-radius: 0.8rem;
            padding: 0.35rem;
        }

        #mainNavbar .dropdown-item {
            border-radius: 0.55rem;
            font-size: 0.86rem;
            padding: 0.45rem 0.62rem;
        }

        #mainNavbar .dropdown-item.active,
        #mainNavbar .dropdown-item:active {
            background: linear-gradient(135deg, #6e2ddc, #de2f85);
            color: #fff;
        }

        .user-menu-btn {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            border-radius: 999px;
            padding: 0.25rem 0.65rem 0.25rem 0.35rem;
            border-color: rgba(255, 255, 255, 0.4) !important;
            color: #fff !important;
        }

        .navbar-toggler {
            border: 0;
            padding: 0.38rem 0.5rem;
            box-shadow: none !important;
        }

        .navbar-toggler-icon-wrap {
            display: inline-flex;
            width: 1.45rem;
            height: 1.15rem;
            position: relative;
        }

        .navbar-toggler-line {
            position: absolute;
            left: 0;
            width: 100%;
            height: 2px;
            background: #fff;
            border-radius: 999px;
            transition: transform 0.22s ease, opacity 0.22s ease, top 0.22s ease;
        }

        .navbar-toggler-line:nth-child(1) { top: 0.05rem; }
        .navbar-toggler-line:nth-child(2) { top: 0.5rem; }
        .navbar-toggler-line:nth-child(3) { top: 0.95rem; }

        .navbar-toggler.is-open .navbar-toggler-line:nth-child(1) {
            top: 0.5rem;
            transform: rotate(45deg);
        }

        .navbar-toggler.is-open .navbar-toggler-line:nth-child(2) {
            opacity: 0;
        }

        .navbar-toggler.is-open .navbar-toggler-line:nth-child(3) {
            top: 0.5rem;
            transform: rotate(-45deg);
        }

        .user-avatar {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 1.6rem;
            height: 1.6rem;
            border-radius: 999px;
            font-size: 0.75rem;
            font-weight: 700;
            background: linear-gradient(135deg, #60a5fa, #a78bfa);
            color: #fff;
        }

        .navbar .navbar-text {
            font-size: 0.83rem;
            color: rgba(255, 255, 255, 0.82) !important;
        }

        .card {
            border: 1px solid var(--brd);
            border-radius: 14px;
            box-shadow: var(--shadow-soft);
            background: var(--srf2);
            transition: transform 0.16s ease, box-shadow 0.16s ease;
        }

        .card:hover {
            transform: translateY(-1px);
            box-shadow: 0 14px 30px rgba(26, 26, 46, 0.09);
        }

        .card-title,
        h1, h2, h3, h4, h5 {
            color: var(--txt);
            font-weight: 600;
        }

        .text-muted,
        .form-text,
        small {
            color: var(--txt2) !important;
        }

        .table {
            --bs-table-bg: transparent;
        }

        .table thead th {
            border-bottom: 1px solid var(--brd);
            color: var(--txt3);
            font-size: 0.72rem;
            text-transform: uppercase;
            letter-spacing: 0.06em;
        }

        .table td {
            border-color: var(--brd);
            color: var(--txt);
            vertical-align: middle;
        }

        .btn {
            border-radius: 9px;
            font-size: .82rem;
            font-weight: 500;
            font-family: var(--font-body);
            letter-spacing: 0.01em;
        }

        .btn-primary {
            border: none;
            background: linear-gradient(135deg, var(--acc2), var(--acc));
            box-shadow: 0 6px 16px rgba(124, 58, 237, 0.28);
        }

        .btn-primary:hover,
        .btn-primary:focus {
            background: linear-gradient(135deg, #6e2ddc, #de2f85);
        }

        .btn-outline-primary {
            color: var(--acc2);
            border-color: rgba(124, 58, 237, 0.35);
            background: #fff;
        }

        .btn-outline-primary:hover {
            background: var(--pri);
            border-color: var(--pri);
            color: #fff;
        }

        .btn-outline-secondary {
            border-color: var(--brd);
            color: var(--txt2);
        }

        .btn-outline-secondary:hover {
            background: var(--srf);
            color: var(--txt);
            border-color: var(--txt3);
        }

        .form-control,
        .form-select {
            border-radius: 9px;
            border: 1.5px solid var(--brd);
            background: var(--srf);
            color: var(--txt);
            font-size: 0.84rem;
            padding-top: 0.58rem;
            padding-bottom: 0.58rem;
        }

        .form-control:focus,
        .form-select:focus {
            border-color: var(--acc2);
            box-shadow: 0 0 0 0.18rem rgba(124, 58, 237, 0.14);
            background: #fff;
        }

        .input-group-text {
            border: 1.5px solid var(--brd);
            background: var(--srf2);
            color: var(--txt2);
        }

        .badge {
            border-radius: 999px;
            font-weight: 500;
            padding: .28rem .58rem;
            font-size: .68rem;
            letter-spacing: 0.01em;
        }

        .form-label {
            color: var(--txt2);
            font-size: 0.78rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 0.4rem;
        }

        h2 {
            font-family: var(--font-disp);
            font-size: 2rem;
            font-weight: 400;
            letter-spacing: -0.02em;
        }

        h3 {
            font-family: var(--font-disp);
            font-size: 1.5rem;
            font-weight: 400;
            letter-spacing: -0.01em;
        }

        .table-hover tbody tr {
            transition: background-color 0.14s ease;
        }

        .table-hover tbody tr:hover {
            background: #fbf9ff;
        }

        #loginForm,
        #registerForm,
        #forgotPasswordForm {
            position: relative;
        }

        #loginForm .btn-primary,
        #registerForm .btn-primary,
        #forgotPasswordForm .btn-primary {
            min-height: 42px;
        }

        #requestOtpBtn {
            min-height: 42px;
        }

        #statsContainer .card {
            border: 0;
            overflow: hidden;
        }

        #statsContainer .card .card-title {
            font-size: 0.76rem;
            text-transform: uppercase;
            letter-spacing: 0.04em;
            opacity: 0.92;
        }

        #statsContainer .card h3 {
            font-family: var(--font-body);
            font-size: 1.7rem;
            font-weight: 700;
            letter-spacing: -0.01em;
        }

        #editorSections .card-header {
            background: linear-gradient(180deg, #f8f6ff, #f1ecff);
            border-bottom: 1px solid var(--brd);
            color: var(--txt);
            font-size: 0.8rem;
            letter-spacing: 0.02em;
        }

        #editorSections textarea.form-control {
            min-height: 180px;
            line-height: 1.55;
        }

        #profileReminder .alert,
        #profileBlock.alert {
            border-left: 4px solid #d97706;
        }

        .bg-success { background-color: #059669 !important; }
        .bg-danger { background-color: #dc2626 !important; }
        .bg-warning { background-color: #f59e0b !important; }
        .bg-info { background-color: #3b82f6 !important; }

        .alert {
            border-radius: 10px;
            border: 1px solid var(--brd);
            font-size: .84rem;
        }

        .toast {
            border-radius: 10px;
        }

        @media (max-width: 768px) {
            .container.main-content {
                padding-top: 96px;
                padding-left: 12px;
                padding-right: 12px;
            }

            #mainNavbar .container {
                align-items: flex-start;
            }

            #mainNavbar #navItems {
                width: 100%;
                padding-top: 0.55rem;
                padding-bottom: 0.6rem;
            }

            #mainNavbar #navLinks {
                width: 100%;
                gap: 0.2rem;
            }

            #mainNavbar #navUserActions {
                width: 100%;
                display: block !important;
                margin-top: 0.5rem;
            }

            #mainNavbar #navUserActions > a,
            #mainNavbar #navUserActions .dropdown,
            #mainNavbar #navUserActions .dropdown > button {
                width: 100%;
            }

            #mainNavbar #navUserActions .dropdown-toggle {
                justify-content: space-between;
            }

            #mainNavbar #navUserActions .dropdown-menu {
                position: static !important;
                transform: none !important;
                inset: auto !important;
                width: 100%;
                margin-top: 0.45rem;
                border-radius: 10px;
            }

            .table-responsive {
                overflow-x: auto;
                -webkit-overflow-scrolling: touch;
            }

            .card {
                border-radius: 12px;
            }

            .btn {
                min-height: 38px;
            }

            .navbar-brand {
                font-size: 1.25rem;
            }

            h2 {
                font-size: 1.6rem;
            }

            h3 {
                font-size: 1.3rem;
            }

            .nav-section-divider {
                display: none;
            }

            #mainNavbar .dropdown-menu {
                border: 0;
                box-shadow: none;
                background: rgba(255, 255, 255, 0.08);
            }

            #mainNavbar .dropdown-item {
                color: rgba(255, 255, 255, 0.86);
            }

            #mainNavbar .dropdown-item:hover {
                background: rgba(255, 255, 255, 0.12);
            }

            .user-menu-btn {
                margin-top: 0.4rem;
                width: 100%;
                justify-content: center;
            }

            #toastContainer {
                left: 12px;
                right: 12px;
                bottom: 14px;
            }
        }

        @media (max-width: 576px) {
            .container.main-content {
                padding-top: 88px;
                padding-left: 10px;
                padding-right: 10px;
                padding-bottom: 16px;
            }

            .navbar#mainNavbar {
                margin-bottom: 0.9rem !important;
            }

            .navbar-brand {
                font-size: 1.03rem;
                max-width: 78vw;
                white-space: nowrap;
                overflow: hidden;
                text-overflow: ellipsis;
            }

            .brand-icon {
                width: 1.35rem;
                height: 1.35rem;
                font-size: 0.8rem;
            }

            .navbar .nav-link {
                font-size: 0.84rem;
                padding-top: 0.45rem;
                padding-bottom: 0.45rem;
            }

            h2 {
                font-size: 1.35rem;
            }

            h3 {
                font-size: 1.15rem;
            }

            #toastContainer {
                left: 10px;
                right: 10px;
            }
        }
    </style>
    
    {% block extra_css %}{% endblock %}
</head>
<body>

    {% include 'partials/landing_navbar.html' %}

    <!-- Progress Bar -->
    <div id="progress"></div>
    
    <!-- Custom Cursor (optional) -->
    <div id="cursor"></div>
    <div id="cursor-ring"></div>
    
    <!-- Main Content Area -->
    <main class="container main-content">
        {% block content %}
        {% endblock %}
    </main>

    <div id="toastContainer" style="
        position: fixed; bottom: 24px; right: 24px;
        display: flex; flex-direction: column; gap: 10px;
        z-index: 9999; pointer-events: none;
    "></div>
    
    {% include 'partials/landing_footer.html' %}

    <!-- Bootstrap Bundle JS (kept for form compatibility) -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    
    <!-- NEW NAVBAR & ANIMATIONS SCRIPTS -->
    <script src="/static/js/navbar.js"></script>
    <script src="/static/js/animations.js"></script>
    
    <!-- Auth Handling Script -->
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const token = localStorage.getItem('token');
            const userJson = localStorage.getItem('user');
            
            const navLinks = document.getElementById('navLinks');
            const navUserActions = document.getElementById('navUserActions');
            const navMenuLinks = document.getElementById('navMenuLinks');

            if (!navLinks || !navUserActions || !navMenuLinks) {
                return;
            }

            const currentPath = window.location.pathname;
            const isAuthPage = ['/login', '/register', '/forgot-password'].includes(currentPath);

            const isPathMatch = (href) => {
                if (!href || href === '#') return false;
                if (href === '/') return currentPath === '/';
                return currentPath === href || currentPath.startsWith(href + '/') || currentPath.startsWith(href + '?');
            };

            const getInitials = (name) => {
                if (!name) return 'U';
                return String(name)
                    .trim()
                    .split(/\s+/)
                    .slice(0, 2)
                    .map((part) => part.charAt(0).toUpperCase())
                    .join('') || 'U';
            };

            const renderGuestNav = () => {
                if (navLinks) navLinks.innerHTML = '';
                if (navMenuLinks) navMenuLinks.innerHTML = '';
                
                navUserActions.innerHTML = `
                    <a href="/login" class="nav-cta-btn" style="border-color: rgba(59, 123, 255, 0.4);">Login</a>
                    <a href="/register" class="nav-cta-btn" style="background: var(--color-blue-2); border-color: var(--color-blue-2);">Register</a>
                `;
                
                navMenuLinks.innerHTML = `
                    <li><a href="/login" class="nav-menu-link">Login</a></li>
                    <li><a href="/register" class="nav-menu-cta">Register</a></li>
                `;
            };

            const renderUserNav = (user) => {
                let desktopLinks = '';
                let mobileLinks = '';

                if (user.role === 'admin') {
                    desktopLinks = `
                        <li><a href="/admin/dashboard">Dashboard</a></li>
                        <li><a href="/admin/users">Users</a></li>
                        <li><a href="/admin/majors">Majors</a></li>
                        <li><a href="/admin/degrees">Degrees</a></li>
                    `;
                    
                    mobileLinks = `
                        <li><a href="/admin/dashboard" class="nav-menu-link">Dashboard</a></li>
                        <li><a href="/admin/users" class="nav-menu-link">Users</a></li>
                        <li><a href="/admin/majors" class="nav-menu-link">Majors</a></li>
                        <li><a href="/admin/degrees" class="nav-menu-link">Degrees</a></li>
                        <li><a href="/admin/universities" class="nav-menu-link">Universities</a></li>
                        <li><a href="/admin/colleges" class="nav-menu-link">Colleges</a></li>
                        <li><a href="/admin/industries" class="nav-menu-link">Industries</a></li>
                        <li><a href="/admin/services" class="nav-menu-link">Services</a></li>
                        <li><a href="/admin/payments" class="nav-menu-link">Payments</a></li>
                        <li><a href="/admin/reports" class="nav-menu-link">Reports</a></li>
                        <li><a href="/admin/types" class="nav-menu-link">Types</a></li>
                    `;
                } else {
                    desktopLinks = `
                        <li><a href="/student/dashboard">My Reports</a></li>
                        <li><a href="/student/profile">My Profile</a></li>
                        <li><a href="/student/create">Create Report</a></li>
                    `;
                    
                    mobileLinks = `
                        <li><a href="/student/dashboard" class="nav-menu-link">My Reports</a></li>
                        <li><a href="/student/profile" class="nav-menu-link">My Profile</a></li>
                        <li><a href="/student/create" class="nav-menu-link">Create Report</a></li>
                    `;
                }

                if (navLinks) {
                    navLinks.innerHTML = desktopLinks;
                    navLinks.querySelectorAll('a').forEach(a => {
                        const href = a.getAttribute('href');
                        if (href && window.location.pathname.startsWith(href)) {
                            a.classList.add('active');
                        }
                    });
                }
                
                navUserActions.innerHTML = `
                    <div style="display: flex; align-items: center; gap: 0.55rem; flex-wrap: wrap; justify-content: flex-end;">
                        <button class="nav-cta-btn" style="background: rgba(255, 255, 255, 0.08); border-color: rgba(152, 177, 255, 0.42);" id="userMenuBtn">
                            ${getInitials(user.name)} • ${user.name || 'User'}
                        </button>
                        <button class="nav-cta-btn" style="border-color: rgba(248, 113, 113, 0.55); color: #fecaca; background: rgba(127, 29, 29, 0.24);" id="logoutBtn" type="button">
                            Logout
                        </button>
                    </div>
                `;
                
                mobileLinks += `
                    <li style="border-top: 1px solid rgba(255, 255, 255, 0.1); padding-top: var(--spacing-lg); margin-top: var(--spacing-lg);">
                        <a href="#" class="nav-menu-link" onclick="logout(); return false;">Logout</a>
                    </li>
                `;
                
                if (navMenuLinks) navMenuLinks.innerHTML = mobileLinks;

                // Add click handler for user menu button
                const userBtn = document.getElementById('userMenuBtn');
                if (userBtn) {
                    userBtn.addEventListener('click', (e) => {
                        e.stopPropagation();
                        showToast(`Welcome back, ${user.name}!`, 'info', 2000);
                    });
                }

                const logoutBtn = document.getElementById('logoutBtn');
                if (logoutBtn) {
                    logoutBtn.addEventListener('click', () => {
                        logout();
                    });
                }
            };

            // Fetch user
            let localUser = null;
            if (userJson) {
                try {
                    localUser = JSON.parse(userJson);
                } catch (_) {
                    localStorage.removeItem('user');
                }
            }

            let serverUser = null;
            let serverCheckOk = false;
            try {
                const meRes = await fetch('/api/auth/me', {
                    method: 'GET',
                    credentials: 'include',
                    headers: token ? { 'Authorization': `Bearer ${token}` } : {}
                });
                serverCheckOk = true;
                if (meRes.ok) {
                    serverUser = await meRes.json();
                }
            } catch (_) {
                // On temporary network failures, fallback to local data.
                serverCheckOk = false;
            }

            if (serverUser && serverUser.role) {
                localStorage.setItem('user', JSON.stringify(serverUser));
                renderUserNav(serverUser);
                return;
            }

            if (isAuthPage) {
                // On auth pages, always show guest nav to avoid stale local user state.
                if (serverCheckOk) {
                    localStorage.removeItem('token');
                    localStorage.removeItem('user');
                }
                renderGuestNav();
                return;
            }

            if (serverCheckOk) {
                // Server confirms no active cookie session; clear stale client auth.
                localStorage.removeItem('token');
                localStorage.removeItem('user');
                renderGuestNav();
                return;
            }

            if (token && localUser && localUser.role) {
                renderUserNav(localUser);
                return;
            }

            renderGuestNav();
        });

        async function logout() {
            try {
                await fetch('/api/auth/logout', {
                    method: 'POST',
                    credentials: 'include',
                    headers: { 'Content-Type': 'application/json' }
                });
            } catch (e) {
                // Ignore network errors during logout and proceed with local cleanup.
            }

            localStorage.removeItem('token');
            localStorage.removeItem('user');
            // Final server-side cookie clear via full-page route to avoid stale cookie loops.
            window.location.href = '/logout';
        }

        window.showToast = function(message, type = 'success', duration = 3500) {
            const colors = {
                success: { bg: '#ecfdf5', border: '#a7f3d0', text: '#065f46', icon: '\u2713' },
                error:   { bg: '#fef2f2', border: '#fecaca', text: '#991b1b', icon: '\u2715' },
                danger:  { bg: '#fef2f2', border: '#fecaca', text: '#991b1b', icon: '\u2715' },
                warning: { bg: '#fffbeb', border: '#fde68a', text: '#92400e', icon: '!' },
                info:    { bg: '#eff6ff', border: '#bfdbfe', text: '#1e40af', icon: 'i' },
            };
            const c = colors[type] || colors.info;
            const toast = document.createElement('div');
            toast.style.cssText = `
                background: ${c.bg}; border: 1px solid ${c.border}; color: ${c.text};
                padding: 12px 16px; border-radius: 12px; font-size: 13px; font-weight: 500;
                display: flex; align-items: center; gap: 10px; pointer-events: all;
                min-width: 240px; max-width: 360px; font-family: 'DM Sans', sans-serif;
                box-shadow: 0 4px 16px rgba(0,0,0,0.08);
                opacity: 0; transform: translateX(20px);
                transition: opacity 0.25s ease, transform 0.25s ease;
            `;
            toast.innerHTML = `
                <span style="width:20px;height:20px;border-radius:50%;background:${c.border};
                    display:flex;align-items:center;justify-content:center;
                    font-size:11px;font-weight:700;flex-shrink:0;">${c.icon}</span>
                <span style="flex:1;">${message}</span>
                <span style="cursor:pointer;opacity:0.5;font-size:16px;line-height:1;">\u00d7</span>
            `;
            const closeBtn = toast.lastElementChild;
            if (closeBtn) {
                closeBtn.addEventListener('click', () => toast.remove());
            }

            const container = document.getElementById('toastContainer');
            if (!container) return;
            container.appendChild(toast);
            requestAnimationFrame(() => {
                toast.style.opacity = '1';
                toast.style.transform = 'translateX(0)';
            });
            setTimeout(() => {
                toast.style.opacity = '0';
                toast.style.transform = 'translateX(20px)';
                setTimeout(() => toast.remove(), 300);
            }, duration);
        };

        window.showConfirm = function(message, onConfirm) {
            const overlay = document.createElement('div');
            overlay.style.cssText = `
                position:fixed;inset:0;background:rgba(15,15,30,0.5);
                z-index:10000;display:flex;align-items:center;justify-content:center;
            `;
            overlay.innerHTML = `
                <div style="background:#fff;border-radius:16px;padding:24px;
                    max-width:360px;width:90%;font-family:'DM Sans',sans-serif;">
                    <div style="font-size:15px;font-weight:500;color:#1a1a2e;
                        margin-bottom:8px;">Are you sure?</div>
                    <div style="font-size:13px;color:#6b6783;margin-bottom:20px;">
                        ${message}</div>
                    <div style="display:flex;gap:10px;justify-content:flex-end;">
                        <button type="button" class="confirm-cancel"
                            style="padding:8px 18px;border-radius:8px;border:1px solid #e8e4f0;
                            background:#fff;color:#6b6783;cursor:pointer;font-size:13px;">
                            Cancel</button>
                        <button type="button" id="confirmYes"
                            style="padding:8px 18px;border-radius:8px;border:none;
                            background:linear-gradient(135deg,#7c3aed,#e84393);
                            color:#fff;cursor:pointer;font-size:13px;font-weight:500;">
                            Confirm</button>
                    </div>
                </div>
            `;
            const cancelBtn = overlay.querySelector('.confirm-cancel');
            if (cancelBtn) {
                cancelBtn.onclick = () => overlay.remove();
            }
            const yesBtn = overlay.querySelector('#confirmYes');
            if (yesBtn) {
                yesBtn.onclick = () => {
                    overlay.remove();
                    onConfirm();
                };
            }
            document.body.appendChild(overlay);
        };
    </script>
    
    {% block extra_js %}{% endblock %}
</body>
</html>
