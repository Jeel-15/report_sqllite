<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">ReportGen fallback visual</title>
  <desc id="desc">Fallback visual shown when external image cannot load.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#dbe8ff"/>
      <stop offset="100%" stop-color="#f3f7ff"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#eef3ff"/>
    </linearGradient>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/>
  <circle cx="1370" cy="130" r="170" fill="#c8d9ff" opacity="0.55"/>
  <circle cx="210" cy="760" r="210" fill="#cedfff" opacity="0.45"/>
  <rect x="230" y="210" rx="26" ry="26" width="1140" height="500" fill="url(#card)" stroke="#bed0f6" stroke-width="2"/>
  <rect x="300" y="300" rx="10" ry="10" width="380" height="30" fill="#8ea8db" opacity="0.85"/>
  <rect x="300" y="350" rx="8" ry="8" width="620" height="22" fill="#adbfdf" opacity="0.9"/>
  <rect x="300" y="392" rx="8" ry="8" width="560" height="22" fill="#adbfdf" opacity="0.9"/>
  <rect x="300" y="434" rx="8" ry="8" width="510" height="22" fill="#adbfdf" opacity="0.9"/>
  <rect x="300" y="500" rx="999" ry="999" width="210" height="56" fill="#2c5db2"/>
  <text x="405" y="537" text-anchor="middle" fill="#ffffff" font-family="Segoe UI, Arial, sans-serif" font-size="26" font-weight="700">ReportGen</text>
  <rect x="960" y="280" rx="20" ry="20" width="320" height="360" fill="#d9e6ff" stroke="#b9cbf0" stroke-width="2"/>
  <circle cx="1120" cy="390" r="76" fill="#b5c9f0"/>
  <rect x="1020" y="500" rx="10" ry="10" width="200" height="24" fill="#95abd6"/>
  <rect x="1000" y="540" rx="10" ry="10" width="240" height="20" fill="#a7bce4"/>
  <text x="800" y="760" text-anchor="middle" fill="#2f4368" font-family="Segoe UI, Arial, sans-serif" font-size="34" font-weight="700">Image unavailable - showing safe fallback</text>
</svg>
